<header class="app-topbar">
    <div class="container-fluid topbar-menu">
        <div class="d-flex align-items-center gap-2">
            <!-- Topbar Brand Logo -->
            <div class="logo-topbar">
                <!-- Logo light -->
                <a routerLink="/" class="logo-light">
                    <span class="logo-lg">
                      <img src="../../../../assets/images/users/image-removebg-preview.png" alt="KAR logo" height="50">
                    </span>
                    <span class="logo-sm">
                        <img src="../../../../assets/images/users/image-removebg-preview.png" alt="KAR logo" height="35">
                    </span>
                </a>

                <!-- Logo Dark -->
                <a routerLink="/" class="logo-dark">
                    <span class="logo-lg">
                      <img src="../../../../assets/images/users/image-removebg-preview.png" alt="KAR logo" height="50">
                    </span>
                    <span class="logo-sm">
                      <img src="../../../../assets/images/users/image-removebg-preview.png" alt="KAR logo" height="35">
                    </span>
                </a>
            </div>

            <!-- Sidebar Menu Toggle Button -->
            <button (click)="toggleSidebar()" class="sidenav-toggle-button btn btn-primary btn-icon">
                <ng-icon name="tablerMenu4" class="fs-22"/>
            </button>

        </div>

        <div class="d-flex align-items-center gap-3 p-2">
            <!-- User Name -->
            <div class="user-info d-flex align-items-center gap-2">
                <div class="user-avatar">
                    <ng-icon name="tablerUserCircle" class="fs-2 text-gold"/>
                </div>
                <span class="user-name text-white fw-semibold">{{ userFullName }}</span>
            </div>

            <!-- Logout Button -->
            <button (click)="logout()" class="btn btn-logout" title="Logout">
                <ng-icon name="tablerLogout" class="fs-5"/>
                <span class="ms-2 d-none d-md-inline">Logout</span>
            </button>
        </div>
    </div>
</header>
