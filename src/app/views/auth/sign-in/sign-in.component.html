<div class="auth-box d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="auth-card">
                    <!-- Logo -->
                    <div class="text-center mb-2">
                        <img src="assets/images/users/image-removebg-preview.png" alt="KAR logo" class="auth-logo">
                    </div>

                    <!-- Sign In Title -->
                    <h2 class="auth-title text-center mb-3 text-dark">WELCOME TO KAR</h2>

                    <!-- Login Form -->
                    <form>
                        <!-- Email Input -->
                        <div class="mb-3">
                            <div class="input-group auth-input-group">
                                <span class="input-icon">
                                    <ng-icon name="tablerMail" class="icon-gold" />
                                </span>
                                <input #userEmail type="email" class="form-control auth-input" 
                                       placeholder="Email" required>
                            </div>
                        </div>

                        <!-- Password Input -->
                        <div class="mb-2">
                            <div class="input-group auth-input-group">
                                <span class="input-icon">
                                    <ng-icon name="tablerLock" class="icon-gold" />
                                </span>
                                <input #userPassword [type]="showPassword ? 'text' : 'password'" 
                                       class="form-control auth-input" 
                                       placeholder="Password" required>
                                <span class="input-icon-end" (click)="togglePassword()">
                                    <ng-icon [name]="showPassword ? 'tablerEyeOff' : 'tablerEye'" class="icon-gold" />
                                </span>
                            </div>
                        </div>

                        <!-- Forgot Password -->
                        <div class="text-end mb-4">
                            <a routerLink="/auth-2/reset-pw" class="forgot-link">Forget Password?</a>
                        </div>

                        <!-- Sign In Button -->
                        <div class="d-grid mb-4">
                            <button type="button" class="btn btn-gold" 
                                    (click)="signIn(userEmail.value, userPassword.value)">
                                Sign In
                            </button>
                        </div>

                        <!-- Social Login -->
                        <!-- <div class="social-login d-flex justify-content-center gap-3 mb-4">
                            <button type="button" class="btn-social">
                                <ng-icon name="tablerBrandApple" class="icon-gold fs-3" />
                            </button>
                            <button type="button" class="btn-social">
                                <ng-icon name="tablerBrandGoogle" class="icon-gold fs-3" />
                            </button>
                        </div> -->

                        <!-- Sign Up Link -->
                        <p class="text-center signup-text mb-0">
                            Don't have an account? 
                            <a routerLink="/auth-2/sign-up" class="signup-link">Signup</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
